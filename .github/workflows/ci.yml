name: ci

on:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore SurrealDb.Net.Linq.sln

      - name: Build
        run: dotnet build SurrealDb.Net.Linq.sln -c Release --no-restore

      - name: Test
        run: dotnet test SurrealDb.Net.Linq.sln -c Release --no-build --logger "trx;LogFileName=tests.trx" --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore

      - name: Pack (dry)
        run: dotnet pack src/SurrealDb.Net.Linq/SurrealDb.Net.Linq.csproj -c Release --no-build -o ./artifacts
