name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Resolve version from tag
        id: ver
        run: |
          RAW="${GITHUB_REF_NAME#v}"
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore SurrealDb.Net.Linq.sln

      - name: Build
        run: dotnet build SurrealDb.Net.Linq.sln -c Release --no-restore /p:Version=${{ steps.ver.outputs.version }}

      - name: Test
        run: dotnet test SurrealDb.Net.Linq.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/SurrealDb.Net.Linq/SurrealDb.Net.Linq.csproj -c Release --no-build -o ./artifacts /p:Version=${{ steps.ver.outputs.version }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Push symbols
        run: dotnet nuget push ./artifacts/*.snupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*.nupkg
          generate_release_notes: true
